name: Tauri Release (macOS + Windows)

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ticket-watcher/package-lock.json

      - name: Install frontend deps
        working-directory: ticket-watcher
        run: npm ci

      - name: Build & bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ticket-watcher
          tagName: ${{ github.ref_name }}
          releaseName: '购票试验 ${{ github.ref_name }}'
          releaseBody: 'Automated build for macOS + Windows.'
          releaseDraft: true
          prerelease: false
